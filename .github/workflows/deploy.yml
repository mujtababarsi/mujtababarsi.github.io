name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Updated to 20 for better compatibility with modern Vite
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install
          # Force compatibility with Tailwind v3 to match your manual configuration files
          npm install tailwindcss@3.4.17 postcss autoprefixer

      - name: Build
        run: npm run build
        env:
          CI: false # Prevents the build from failing on non-critical warnings

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
